# Собирает frontend и пушит в ветку gh-pages — так GitHub Pages стабильно отдаёт сайт.
# После первого успешного запуска: Settings → Pages → Source: Branch «gh-pages», folder «/ (root)».
# Сайт: https://ggrmeee-sudo.github.io/snackly/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & build
        working-directory: frontend
        run: |
          npm install
          npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          force_orphan: true
