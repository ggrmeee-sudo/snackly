# Blueprint для https://render.com — подключи репозиторий GitHub и создай сервис из этого файла.
services:
  - type: web
    name: snackly
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
